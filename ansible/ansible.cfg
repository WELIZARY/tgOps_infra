[defaults]
inventory = inventory/gcp.yml
host_key_checking = False
retry_files_enabled = False
result_format = yaml
deprecation_warnings = False
roles_path = roles
interpreter_python = /usr/bin/python3
timeout = 60

[ssh_connection]
pipelining = True
ssh_args = -o ServerAliveInterval=30 -o ServerAliveCountMax=6
