---
# каркас для бота, сам деплой версий делает jenkins через deploy.sh

- name: каталог бота
  ansible.builtin.file:
    path: /opt/tgops
    state: directory
    mode: "0755"
  become: true

# deploy.sh тянет образ из artifact registry и читает секреты
- name: добавить apt репозиторий google cloud sdk
  ansible.builtin.shell: |
    set -e
    install -m 0755 -d /usr/share/keyrings
    curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
    echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" > /etc/apt/sources.list.d/google-cloud-sdk.list
  args:
    creates: /etc/apt/sources.list.d/google-cloud-sdk.list
  become: true

- name: установить google-cloud-cli
  ansible.builtin.apt:
    name: google-cloud-cli
    update_cache: true
    state: present
  become: true

- name: настроить docker на вытягивание из artifact registry через sa машины
  ansible.builtin.command: gcloud auth configure-docker europe-west3-docker.pkg.dev --quiet
  args:
    creates: /root/.docker/config.json
  become: true

- name: локальный реверс прокси webhook
  ansible.builtin.template:
    src: caddy-compose.yml.j2
    dest: /opt/tgops/docker-compose.caddy.yml
    mode: "0644"
  become: true

- name: апстрим переключает deploy.sh
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /opt/tgops/Caddyfile
    mode: "0644"
  become: true

# редактируемый конфиг бота на vm, монтируется в контейнер поверх собранного
- name: положить конфиг бота на сервер
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /opt/tgops/config.yaml
    mode: "0644"
  become: true

- name: скрипт деплоя
  ansible.builtin.template:
    src: deploy.sh.j2
    dest: /opt/tgops/deploy.sh
    mode: "0755"
  become: true

- name: скрипт отката
  ansible.builtin.template:
    src: rollback.sh.j2
    dest: /opt/tgops/rollback.sh
    mode: "0755"
  become: true

# отдельный пользователь под деплой из jenkins (ssh ключ jenkins, без os login)
- name: пользователь tgdeploy
  ansible.builtin.user:
    name: tgdeploy
    shell: /bin/bash
    create_home: true
  become: true

- name: достать публичный deploy-ключ из secret manager
  ansible.builtin.command: gcloud secrets versions access latest --secret=tgops-deploy-ssh-pub
  register: deploy_pub
  changed_when: false
  become: true

- name: положить публичный deploy-ключ в authorized_keys tgdeploy
  ansible.posix.authorized_key:
    user: tgdeploy
    state: present
    key: "{{ deploy_pub.stdout }}"
    exclusive: true
  become: true

- name: sudoers tgdeploy только на deploy и rollback скрипты
  ansible.builtin.copy:
    dest: /etc/sudoers.d/tgdeploy
    content: "tgdeploy ALL=(ALL) NOPASSWD: /opt/tgops/deploy.sh, /opt/tgops/rollback.sh\n"
    mode: "0440"
    validate: visudo -cf %s
  become: true

- name: поднять caddy
  ansible.builtin.command: docker compose -f docker-compose.caddy.yml up -d
  args:
    chdir: /opt/tgops
  become: true
