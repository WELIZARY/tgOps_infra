---
# jenkins controller в docker, данные на отдельном диске


- name: отформатировать диск с данными jenkins в ext4 если он ещё пустой
  community.general.filesystem:
    fstype: ext4
    dev: /dev/disk/by-id/google-jenkins-data
  become: true

- name: примонтировать диск с данными jenkins в /data/jenkins
  ansible.posix.mount:
    path: /data/jenkins
    src: /dev/disk/by-id/google-jenkins-data
    fstype: ext4
    opts: defaults
    state: mounted
  become: true

- name: создать каталог /data/jenkins с владельцем uid 1000
  ansible.builtin.file:
    path: /data/jenkins
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"
  become: true

- name: создать файл подкачки на 2 гб
  ansible.builtin.command: dd if=/dev/zero of=/swapfile bs=1M count=2048
  args:
    creates: /swapfile
  become: true

- name: выставить права 0600 на файл подкачки
  ansible.builtin.file:
    path: /swapfile
    mode: "0600"
  become: true

- name: инициализировать swap на файле подкачки
  ansible.builtin.command: mkswap /swapfile
  args:
    creates: /var/cache/.swap_done
  become: true

- name: включить swap
  ansible.builtin.shell: swapon /swapfile && touch /var/cache/.swap_done
  args:
    creates: /var/cache/.swap_done
  become: true

- name: добавить swap в /etc/fstab чтобы подключался после перезагрузки
  ansible.builtin.lineinfile:
    path: /etc/fstab
    line: "/swapfile none swap sw 0 0"
    state: present
  become: true

- name: снизить агрессивность подкачки (vm.swappiness 20)
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "20"
    state: present
    reload: true
  become: true

- name: положить dockerfile кастомного jenkins (с gcloud для пайплайна) на сервер
  ansible.builtin.template:
    src: Dockerfile.jenkins.j2
    dest: /data/jenkins/Dockerfile
    mode: "0644"
  become: true

- name: положить docker-compose jenkins на сервер
  ansible.builtin.template:
    src: jenkins-compose.yml.j2
    dest: /data/jenkins/docker-compose.yml
    mode: "0644"
  become: true

- name: положить конфиг jenkins configuration as code
  ansible.builtin.template:
    src: jenkins.yaml.j2
    dest: /data/jenkins/jenkins.yaml
    mode: "0644"
  become: true

- name: собрать кастомный образ и запустить контейнер jenkins
  ansible.builtin.command: docker compose up -d --build
  args:
    chdir: /data/jenkins
  become: true
