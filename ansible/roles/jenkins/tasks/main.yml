---
# jenkins controller в docker, данные на отдельном диске

# форматируем диск только если на нём ещё нет fs (модуль идемпотентен, данные не трёт)
- name: создать ext4 на диске jenkins_data если пусто
  community.general.filesystem:
    fstype: ext4
    dev: /dev/disk/by-id/google-jenkins-data
  become: true

- name: примонтировать диск jenkins_home
  ansible.posix.mount:
    path: /data/jenkins
    src: /dev/disk/by-id/google-jenkins-data
    fstype: ext4
    opts: defaults
    state: mounted
  become: true

- name: каталог jenkins
  ansible.builtin.file:
    path: /data/jenkins
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"
  become: true

# gcloud, terraform, kubectl в дефолтных репо debian отсутствуют, добавляем свои
- name: apt репозитории google cloud sdk, hashicorp, kubernetes
  ansible.builtin.shell: |
    set -e
    install -m 0755 -d /usr/share/keyrings
    . /etc/os-release
    curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
    echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" > /etc/apt/sources.list.d/google-cloud-sdk.list
    curl -fsSL https://apt.releases.hashicorp.com/gpg | gpg --dearmor -o /usr/share/keyrings/hashicorp.gpg
    echo "deb [signed-by=/usr/share/keyrings/hashicorp.gpg] https://apt.releases.hashicorp.com ${VERSION_CODENAME} main" > /etc/apt/sources.list.d/hashicorp.list
    curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.31/deb/Release.key | gpg --dearmor -o /usr/share/keyrings/kubernetes.gpg
    echo "deb [signed-by=/usr/share/keyrings/kubernetes.gpg] https://pkgs.k8s.io/core:/stable:/v1.31/deb/ /" > /etc/apt/sources.list.d/kubernetes.list
  args:
    creates: /etc/apt/sources.list.d/hashicorp.list
  become: true

- name: тулинг на хосте (gcloud, terraform, kubectl, ansible, jq)
  ansible.builtin.apt:
    name: [google-cloud-cli, terraform, kubectl, ansible, jq]
    update_cache: true
    state: present
  become: true

- name: compose jenkins
  ansible.builtin.template:
    src: jenkins-compose.yml.j2
    dest: /data/jenkins/docker-compose.yml
    mode: "0644"
  become: true

- name: jcasc конфиг
  ansible.builtin.template:
    src: jenkins.yaml.j2
    dest: /data/jenkins/jenkins.yaml
    mode: "0644"
  become: true

- name: поднять jenkins
  ansible.builtin.command: docker compose up -d
  args:
    chdir: /data/jenkins
  become: true
