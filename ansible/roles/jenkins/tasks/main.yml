---
# jenkins controller в docker, данные на отдельном диске

# форматируем диск только если на нём ещё нет fs (модуль идемпотентен, данные не трёт)
- name: создать ext4 на диске jenkins_data если пусто
  community.general.filesystem:
    fstype: ext4
    dev: /dev/disk/by-id/google-jenkins-data
  become: true

- name: примонтировать диск jenkins_home
  ansible.posix.mount:
    path: /data/jenkins
    src: /dev/disk/by-id/google-jenkins-data
    fstype: ext4
    opts: defaults
    state: mounted
  become: true

- name: каталог jenkins
  ansible.builtin.file:
    path: /data/jenkins
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"
  become: true

# gcloud в дефолтных репо debian нет, добавляем только надёжный google репо
- name: apt репозиторий google cloud sdk
  ansible.builtin.shell: |
    set -e
    install -m 0755 -d /usr/share/keyrings
    curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
    echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" > /etc/apt/sources.list.d/google-cloud-sdk.list
  args:
    creates: /etc/apt/sources.list.d/google-cloud-sdk.list
  become: true

- name: тулинг из apt (gcloud, ansible, jq)
  ansible.builtin.apt:
    name: [google-cloud-cli, ansible, jq]
    update_cache: true
    state: present
  become: true

# terraform и kubectl установка из бинарников
- name: terraform бинарь в /usr/local/bin
  ansible.builtin.unarchive:
    src: https://releases.hashicorp.com/terraform/1.10.5/terraform_1.10.5_linux_amd64.zip
    dest: /usr/local/bin
    remote_src: true
    creates: /usr/local/bin/terraform
    mode: "0755"
  become: true

- name: kubectl бинарь в /usr/local/bin
  ansible.builtin.get_url:
    url: https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl
    dest: /usr/local/bin/kubectl
    mode: "0755"
  become: true

- name: compose jenkins
  ansible.builtin.template:
    src: jenkins-compose.yml.j2
    dest: /data/jenkins/docker-compose.yml
    mode: "0644"
  become: true

- name: jcasc конфиг
  ansible.builtin.template:
    src: jenkins.yaml.j2
    dest: /data/jenkins/jenkins.yaml
    mode: "0644"
  become: true

- name: поднять jenkins
  ansible.builtin.command: docker compose up -d
  args:
    chdir: /data/jenkins
  become: true
