---
# стек мониторинга в docker compose

# форматируем диск только если на нём ещё нет fs (если с фс, то данные не трем)
- name: создать ext4 на диске mon_data если пусто
  community.general.filesystem:
    fstype: ext4
    dev: /dev/disk/by-id/google-mon-data
  become: true

- name: примонтировать диск под данные мониторинга
  ansible.posix.mount:
    path: /data/mon
    src: /dev/disk/by-id/google-mon-data
    fstype: ext4
    opts: defaults
    state: mounted
  become: true

- name: каталоги стека
  ansible.builtin.file:
    path: "/data/mon/{{ item }}"
    state: directory
    mode: "0777"
  loop: [prometheus, loki, grafana, alertmanager, dashboards]
  become: true

- name: дашборды grafana и провайдер (статикой, без шаблона)
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "/data/mon/{{ item.dst }}"
    mode: "0644"
  loop:
    - { src: grafana-dashboards.yml, dst: grafana-dashboards.yml }
    - { src: tgops-overview.json, dst: dashboards/tgops-overview.json }
  become: true

- name: конфиги стека
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "/data/mon/{{ item.dst }}"
    mode: "0644"
  loop:
    - { src: compose.yml.j2, dst: docker-compose.yml }
    - { src: prometheus.yml.j2, dst: prometheus.yml }
    - { src: rules.yml.j2, dst: rules.yml }
    - { src: alertmanager.yml.j2, dst: alertmanager.yml }
    - { src: loki.yml.j2, dst: loki.yml }
    - { src: grafana-ds.yml.j2, dst: grafana-datasources.yml }
  become: true

- name: поднять стек
  ansible.builtin.command: docker compose up -d
  args:
    chdir: /data/mon
  become: true
